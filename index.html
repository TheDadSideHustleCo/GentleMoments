<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gentle Moments">
<title>Memory Lane: Gentle Moments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%231a1a4e'/%3E%3Ctext x='90' y='120' font-size='90' text-anchor='middle'%3E%F0%9F%A7%A1%3C/text%3E%3Ctext x='90' y='165' font-size='18' text-anchor='middle' fill='%23f5c518' font-family='serif'%3EMemories%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#2c1810;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Lato',sans-serif;overflow:hidden;}
.tv-wrap{position:relative;width:100%;max-width:480px;margin:0 auto;}
.tv-shell{background:linear-gradient(145deg,#8B6914,#6b4f0f,#4a3208,#6b4f0f);border-radius:28px;padding:18px 18px 60px;box-shadow:0 20px 60px rgba(0,0,0,.7),inset 0 2px 4px rgba(255,220,100,.2);position:relative;}
.tv-antenna{display:flex;justify-content:center;gap:60px;margin-bottom:6px;}
.antenna-leg{width:4px;height:38px;background:linear-gradient(to bottom,#ccc,#888);border-radius:2px;transform-origin:bottom center;}
.antenna-leg:first-child{transform:rotate(-20deg);}
.antenna-leg:last-child{transform:rotate(20deg);}
.tv-bezel{background:linear-gradient(145deg,#5a3a10,#3d2508);border-radius:18px;padding:6px 6px 4px;box-shadow:inset 0 4px 12px rgba(0,0,0,.6),0 2px 4px rgba(255,200,50,.15);}
.tv-label{text-align:center;color:#f5c518;font-family:'Playfair Display',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:3px 0 5px;text-shadow:0 0 8px rgba(245,197,24,.5);}
.tv-screen{background:#1a1a4e;border-radius:12px;min-height:520px;position:relative;overflow:hidden;box-shadow:inset 0 0 30px rgba(0,0,0,.8),inset 0 0 60px rgba(10,10,80,.5);display:flex;flex-direction:column;}
.tv-screen::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,80,.03) 2px,rgba(0,0,80,.03) 4px);pointer-events:none;z-index:10;border-radius:12px;}
.tv-controls{display:flex;justify-content:space-between;align-items:center;padding:10px 20px 0;margin-top:4px;}
.knob-group{display:flex;gap:14px;align-items:center;}
.knob{width:28px;height:28px;background:radial-gradient(circle at 35% 35%,#666,#222);border-radius:50%;box-shadow:0 3px 6px rgba(0,0,0,.6),inset 0 1px 2px rgba(255,255,255,.1);position:relative;}
.knob::after{content:'';position:absolute;top:50%;left:50%;width:3px;height:10px;background:#999;border-radius:2px;transform:translate(-50%,-80%);}
.knob-label{color:#888;font-size:9px;letter-spacing:1px;text-transform:uppercase;text-align:center;}
.speaker-dots{display:flex;gap:5px;align-items:center;}
.speaker-dot{width:5px;height:5px;background:#444;border-radius:50%;}
/* Screen content */
.screen-inner{flex:1;padding:16px;display:flex;flex-direction:column;position:relative;z-index:1;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;min-height:36px;}
.btn-top{background:transparent;border:1.5px solid rgba(245,197,24,.5);color:#f5c518;font-family:'Lato',sans-serif;font-size:12px;padding:6px 10px;border-radius:20px;cursor:pointer;transition:all .2s;}
.btn-top:hover{background:rgba(245,197,24,.15);}
.btn-read-aloud{background:rgba(245,197,24,.15);border:1.5px solid #f5c518;color:#f5c518;font-family:'Lato',sans-serif;font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;}
/* Home screen */
.home-title{font-family:'Playfair Display',serif;font-size:26px;color:#f5c518;text-align:center;line-height:1.2;margin-bottom:4px;text-shadow:0 0 12px rgba(245,197,24,.3);}
.home-subtitle{color:rgba(255,255,255,.6);font-size:13px;text-align:center;margin-bottom:14px;}
.daily-spark-box{background:rgba(245,197,24,.08);border:1.5px solid rgba(245,197,24,.4);border-radius:12px;padding:14px;margin-bottom:14px;position:relative;}
.daily-spark-label{font-size:11px;color:#f5c518;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.daily-spark-text{color:#fff;font-size:17px;font-family:'Playfair Display',serif;line-height:1.4;}
.mode-btn{width:100%;background:rgba(255,255,255,.04);border:2px solid rgba(245,197,24,.5);color:#fff;font-family:'Lato',sans-serif;font-size:18px;font-weight:700;padding:14px 16px;border-radius:14px;cursor:pointer;margin-bottom:8px;text-align:left;transition:all .2s;display:flex;align-items:center;gap:12px;}
.mode-btn:hover{background:rgba(245,197,24,.12);border-color:#f5c518;}
.mode-btn .mode-emoji{font-size:24px;}
.mode-btn .mode-desc{font-size:12px;color:rgba(255,255,255,.55);font-weight:400;display:block;margin-top:2px;}
.settings-btn{width:100%;background:transparent;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);font-size:13px;padding:10px;border-radius:10px;cursor:pointer;margin-top:4px;}
.how-to-play-link{text-align:center;margin-top:8px;}
.how-to-play-link a{color:rgba(245,197,24,.6);font-size:12px;text-decoration:none;}
/* Song mode */
.mode-header{font-family:'Playfair Display',serif;font-size:20px;color:#f5c518;text-align:center;margin-bottom:4px;}
.decade-selector{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
.decade-btn{background:transparent;border:1.5px solid rgba(245,197,24,.4);color:rgba(255,255,255,.7);font-size:12px;padding:5px 10px;border-radius:20px;cursor:pointer;transition:all .2s;}
.decade-btn.active{background:#f5c518;color:#1a1a4e;font-weight:700;}
.song-card{background:rgba(255,255,255,.05);border:1.5px solid rgba(245,197,24,.3);border-radius:14px;padding:20px;flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;}
.song-title{font-size:13px;color:#f5c518;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.song-lyric{font-family:'Playfair Display',serif;font-size:24px;color:#fff;line-height:1.5;margin-bottom:16px;}
.blank{color:#f5c518;border-bottom:2px solid #f5c518;padding:0 4px;min-width:60px;display:inline-block;}
.answer-reveal{background:rgba(245,197,24,.1);border:1.5px solid #f5c518;border-radius:10px;padding:12px;margin-bottom:12px;text-align:center;}
.answer-reveal-label{font-size:12px;color:#f5c518;margin-bottom:4px;}
.answer-reveal-text{font-family:'Playfair Display',serif;font-size:22px;color:#fff;font-weight:700;}
.convo-starter{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:14px;color:rgba(255,255,255,.75);font-style:italic;text-align:center;}
.btn-primary{width:100%;background:linear-gradient(135deg,#f5c518,#d4a017);color:#1a1a4e;font-family:'Lato',sans-serif;font-size:17px;font-weight:700;padding:14px;border-radius:12px;border:none;cursor:pointer;margin-top:auto;}
.btn-secondary{width:100%;background:transparent;border:2px solid #f5c518;color:#f5c518;font-family:'Lato',sans-serif;font-size:16px;font-weight:700;padding:12px;border-radius:12px;cursor:pointer;margin-top:8px;}
/* Remember When */
.chapter-selector{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
.chapter-btn{background:transparent;border:1.5px solid rgba(245,197,24,.4);color:rgba(255,255,255,.7);font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;}
.chapter-btn.active{background:rgba(245,197,24,.2);border-color:#f5c518;color:#f5c518;}
.prompt-card{background:rgba(255,255,255,.05);border:1.5px solid rgba(245,197,24,.3);border-radius:14px;padding:20px;flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;}
.prompt-chapter{font-size:11px;color:#f5c518;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.prompt-text{font-family:'Playfair Display',serif;font-size:22px;color:#fff;line-height:1.5;margin-bottom:16px;}
.caregiver-tip{font-size:13px;color:rgba(255,255,255,.5);font-style:italic;padding:8px;border-top:1px solid rgba(245,197,24,.2);margin-top:auto;}
.caregiver-tip-label{font-size:10px;color:#f5c518;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px;}
/* What Belongs */
.category-label{font-family:'Playfair Display',serif;font-size:20px;color:#f5c518;text-align:center;margin-bottom:6px;}
.category-sub{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:12px;}
.tile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.tile-grid.simple{grid-template-columns:repeat(2,1fr);}
.tile{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 6px;text-align:center;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.tile.selected{background:rgba(245,197,24,.2);border-color:#f5c518;box-shadow:0 0 16px rgba(245,197,24,.4);animation:tilePop .25s ease;}
@keyframes tilePop{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
.tile-emoji{font-size:38px;line-height:1;}
.tile-label{font-size:13px;color:rgba(255,255,255,.8);}
.tile.selected .tile-label{color:#f5c518;}
.celebration{text-align:center;padding:20px;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;}
.celebration-emoji{font-size:60px;animation:bounce 0.6s ease infinite alternate;}
@keyframes bounce{from{transform:scale(1);}to{transform:scale(1.15);}}
.celebration-text{font-family:'Playfair Display',serif;font-size:26px;color:#f5c518;}
.celebration-sub{font-size:15px;color:rgba(255,255,255,.7);}
.float-star{position:absolute;font-size:22px;animation:floatUp 1.8s ease-out forwards;pointer-events:none;}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-90px) scale(.4);opacity:0;}}
/* Settings panel */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;justify-content:center;align-items:center;}
.settings-panel{background:#1a1a4e;border:2px solid #f5c518;border-radius:18px;padding:20px;width:90%;max-width:400px;max-height:85vh;overflow-y:auto;}
.settings-title{font-family:'Playfair Display',serif;font-size:22px;color:#f5c518;text-align:center;margin-bottom:4px;}
.settings-saved{font-size:11px;color:rgba(245,197,24,.6);text-align:center;margin-bottom:16px;}
.settings-section{margin-bottom:16px;}
.settings-label{font-size:12px;color:#f5c518;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.settings-options{display:flex;gap:8px;flex-wrap:wrap;}
.opt-btn{background:transparent;border:1.5px solid rgba(245,197,24,.4);color:rgba(255,255,255,.7);font-size:13px;padding:6px 12px;border-radius:20px;cursor:pointer;}
.opt-btn.active{background:#f5c518;color:#1a1a4e;font-weight:700;border-color:#f5c518;}
.settings-done{width:100%;background:#f5c518;color:#1a1a4e;font-size:18px;font-weight:700;padding:14px;border-radius:12px;border:none;cursor:pointer;margin-top:8px;}
/* How to play */
.howto-title{font-family:'Playfair Display',serif;font-size:22px;color:#f5c518;text-align:center;margin-bottom:12px;}
.howto-section{margin-bottom:14px;}
.howto-section h3{font-size:14px;color:#f5c518;margin-bottom:6px;}
.howto-section p{font-size:13px;color:rgba(255,255,255,.8);line-height:1.6;}
.progress-bar-wrap{height:3px;background:rgba(245,197,24,.15);border-radius:2px;margin-bottom:10px;}
.progress-bar-fill{height:3px;background:#f5c518;border-radius:2px;transition:width .4s ease;}
/* Hidden */
.hidden{display:none!important;}
@media(max-height:700px){.tv-screen{min-height:460px;}.home-title{font-size:22px;}.song-lyric,.prompt-text{font-size:20px;}}
.screen-inner{animation:fadeIn .3s ease;}
.fade-out{opacity:0!important;transition:opacity .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
body.text-large .song-lyric,body.text-large .prompt-text{font-size:28px!important;}
body.text-large .daily-spark-text{font-size:20px!important;}
body.text-large .mode-btn{font-size:20px!important;}
body.text-large .tile-emoji{font-size:46px!important;}
body.text-large .tile-label{font-size:13px!important;}
body.text-xlarge .song-lyric,body.text-xlarge .prompt-text{font-size:34px!important;}
body.text-xlarge .daily-spark-text{font-size:24px!important;}
body.text-xlarge .mode-btn{font-size:22px!important;}
body.text-xlarge .answer-reveal-text{font-size:28px!important;}
body.text-xlarge .tile-emoji{font-size:52px!important;}
body.text-xlarge .tile-label{font-size:14px!important;}
body.high-contrast .tv-screen{background:#000!important;box-shadow:inset 0 0 0 2px #f5c518;}
body.high-contrast .song-card,body.high-contrast .prompt-card,body.high-contrast .daily-spark-box{background:rgba(255,255,255,.06)!important;border-color:#f5c518!important;}
body.high-contrast .song-lyric,body.high-contrast .prompt-text,body.high-contrast .daily-spark-text,body.high-contrast .answer-reveal-text{color:#fff!important;text-shadow:none!important;}
body.high-contrast .mode-btn{background:rgba(255,255,255,.05)!important;border-color:#f5c518!important;color:#fff!important;}
body.high-contrast .tile{background:rgba(255,255,255,.08)!important;border-color:rgba(255,255,255,.3)!important;}
body.high-contrast .tile.selected{background:rgba(245,197,24,.25)!important;border-color:#f5c518!important;}
body.high-contrast .caregiver-tip{color:rgba(255,255,255,.7)!important;}
.calm-orb{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(100,200,180,.4),rgba(100,200,180,.1));border:2px solid rgba(100,200,180,.5);animation:breathe 4s ease-in-out infinite;margin:0 auto 20px;}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.7;}50%{transform:scale(1.18);opacity:1;}}
.calm-msg{font-family:'Playfair Display',serif;font-size:22px;color:rgba(255,255,255,.9);text-align:center;line-height:1.6;margin-bottom:16px;}
</style>
</head>
<body>
<div class="tv-wrap">
 <div class="tv-shell">
  <div class="tv-antenna"><div class="antenna-leg"></div><div class="antenna-leg"></div></div>
  <div class="tv-bezel">
   <div class="tv-label">✦ Memory Lane ✦</div>
   <div class="tv-screen" id="screen">
    <!-- Content injected by JS -->
   </div>
  </div>
  <div class="tv-controls">
   <div class="knob-group"><div><div class="knob"></div><div class="knob-label">VOL</div></div><div><div class="knob"></div><div class="knob-label">CH</div></div></div>
   <div class="speaker-dots"><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div><div class="speaker-dot"></div></div>
  </div>
 </div>
</div>

<div class="settings-overlay hidden" id="settingsOverlay">
 <div class="settings-panel" id="settingsPanel">
  <div class="settings-title">Caregiver Settings</div>
  <div class="settings-saved">Changes saved automatically</div>
  <div class="settings-section">
   <div class="settings-label">Birth Decade</div>
   <div class="settings-options" id="decadeOpts"></div>
  </div>
  <div class="settings-section">
   <div class="settings-label">Session Length</div>
   <div class="settings-options" id="sessionOpts"></div>
  </div>
  <div class="settings-section">
   <div class="settings-label">Read Aloud</div>
   <div class="settings-options" id="readAloudOpts"></div>
  </div>
  <div class="settings-section">
   <div class="settings-label">Song Categories</div>
   <div class="settings-options" id="songCatOpts"></div>
  </div>
  <div class="settings-section">
   <div class="settings-label">Reminiscence Chapters</div>
   <div class="settings-options" id="chapterOpts"></div>
  </div>
  <div class="settings-section">
   <div class="settings-label">What Belongs Difficulty</div>
   <div class="settings-options" id="diffOpts"></div>
  </div>
  <div class="settings-section">
   <div class="settings-label">Conversation Starters</div>
   <div class="settings-options" id="convoOpts"></div>
  </div>
  <div class="settings-section">
   <div class="settings-label">Text Size</div>
   <div class="settings-options" id="textSizeOpts"></div>
  </div>
  <div class="settings-section">
   <div class="settings-label">High Contrast Screen</div>
   <div class="settings-options" id="highContrastOpts"></div>
  </div>
  <button class="settings-done" onclick="closeSettings()">Done ✓</button>
 </div>
</div>

<script>
    const APP_VERSION = '1.0.0';
// ── DATA ──────────────────────────────────────────────────────────────────────
const DAILY_SPARKS = [];  // filled below
const SONGS = [];         // filled below
const PROMPTS = [];       // filled below
const ROUNDS = [];        // filled below

// ── SETTINGS ─────────────────────────────────────────────────────────────────
const DEFAULT_SETTINGS = {
 decade:'1940s', sessionLen:10, readAloud:'on',
 songCats:['Pop','Country','Folk','Classic','Hymns'],
 chapters:['Childhood','Family','Work & Purpose','Love & Marriage','Holidays & Traditions','Simple Pleasures'],
 difficulty:'Standard', convoStarters:true, textSize:'normal', highContrast:false
};
let settings = Object.assign({}, DEFAULT_SETTINGS);
try { const s = localStorage.getItem('gmSettings'); if(s) settings = Object.assign({}, DEFAULT_SETTINGS, JSON.parse(s)); } catch(e){}
function applyTextSize(){
 document.body.classList.remove('text-large','text-xlarge');
 if(settings.textSize==='large') document.body.classList.add('text-large');
 else if(settings.textSize==='xlarge') document.body.classList.add('text-xlarge');
}
function applyHighContrast(){
 document.body.classList.toggle('high-contrast', !!settings.highContrast);
}
function saveSettings(){ try{localStorage.setItem('gmSettings', JSON.stringify(settings));}catch(e){} applyTextSize(); applyHighContrast(); }

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentScreen = 'home';
let sparkOffset = 0;
let songIndex = 0, promptIndex = 0, roundIndex = 0;
let sessionSongList = [], sessionPromptList = [], sessionRoundList = [];
let answerShown = false;
let settingsTaps = 0, settingsTapTimer = null;
let speechSynth = window.speechSynthesis;

// ── SPEECH ────────────────────────────────────────────────────────────────────
function speak(text, force){
 if(!force && settings.readAloud === 'off') return;
 speechSynth.cancel();
 const u = new SpeechSynthesisUtterance(text);
 u.rate = 0.85; u.pitch = 1.0; u.volume = 1.0;
 speechSynth.speak(u);
}
function speakCurrent(){
 if(currentScreen==='home'){
  const sp = getDailySpark();
  speak('Today\'s Daily Spark: ' + sp, true);
 } else if(currentScreen==='song'){
  const s = sessionSongList[songIndex];
  if(s && answerShown) speak('Here it is: ' + s.answer, true);
  else if(s) speak(s.lyric.replace('____','blank') + '. ' + s.title, true);
 } else if(currentScreen==='prompt'){
  const p = sessionPromptList[promptIndex];
  if(p) speak(p.text, true);
 } else if(currentScreen==='round'){
  const r = sessionRoundList[roundIndex];
  if(r) speak('Find the things that belong in: ' + r.category, true);
 } else if(currentScreen==='calm'){
  speak('Take a gentle breath. You are safe. All is well.', true);
 }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getDailySpark(){
 if(!DAILY_SPARKS.length) return 'What was your favourite meal growing up?';
 const day = Math.floor(Date.now()/86400000);
 return DAILY_SPARKS[(day + sparkOffset) % DAILY_SPARKS.length];
}
function nextSpark(){ sparkOffset++; showHome(); }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
function buildSongSession(){
 // Birth decade → songs from that decade plus the two that follow (childhood + young adult years)
 const allDecades = ['1910s','1920s','1930s','1940s','1950s','1960s'];
 const di = allDecades.indexOf(settings.decade);
 const eraDecades = allDecades.slice(Math.max(0,di-1), di+3);
 let pool = SONGS.filter(s => settings.songCats.includes(s.cat) && eraDecades.includes(s.decade));
 if(!pool.length) pool = SONGS.filter(s => settings.songCats.includes(s.cat));
 if(!pool.length) pool = SONGS;
 sessionSongList = shuffle(pool).slice(0, settings.sessionLen);
 songIndex = 0; answerShown = false;
}
function buildPromptSession(){
 let pool = PROMPTS.filter(p => settings.chapters.includes(p.chapter));
 if(!pool.length) pool = PROMPTS;
 sessionPromptList = shuffle(pool).slice(0, settings.sessionLen);
 promptIndex = 0;
}
function buildRoundSession(){
 sessionRoundList = shuffle(ROUNDS).slice(0, settings.sessionLen);
 roundIndex = 0;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
const screen = document.getElementById('screen');
function render(html, instant){
 if(instant){ screen.innerHTML = html; return; }
 const inner = screen.querySelector('.screen-inner');
 if(inner){
  inner.classList.add('fade-out');
  setTimeout(()=>{ screen.innerHTML = html; }, 220);
 } else {
  screen.innerHTML = html;
 }
}

function progressBar(current, total){
 const pct = total>0 ? Math.round((current/total)*100) : 0;
 return `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`;
}

function handleSettingsTap(){
 settingsTaps++;
 clearTimeout(settingsTapTimer);
 settingsTapTimer = setTimeout(()=>{ settingsTaps=0; updateSettingsBtn(); }, 1500);
 if(settingsTaps>=3){ settingsTaps=0; updateSettingsBtn(); openSettings(); return; }
 updateSettingsBtn();
}
function updateSettingsBtn(){
 const btn = document.querySelector('.settings-btn');
 if(!btn) return;
 const remaining = 3 - settingsTaps;
 if(settingsTaps===0) btn.textContent = 'Caregiver Settings — Tap 3 times to open';
 else if(remaining===2) btn.textContent = 'Caregiver Settings — 2 more taps…';
 else if(remaining===1) btn.textContent = 'Caregiver Settings — 1 more tap…';
}
function openSettings(){
 buildSettingsUI();
 document.getElementById('settingsOverlay').classList.remove('hidden');
}
function closeSettings(){
 document.getElementById('settingsOverlay').classList.add('hidden');
}
function buildSettingsUI(){
 const decades = ['1910s','1920s','1930s','1940s','1950s','1960s'];
 const sessions = [5,10,15];
 const readModes = ['off','on','auto'];
 const cats = ['Pop','Country','Folk','Classic','Hymns'];
 const chaps = ['Childhood','Family','Work & Purpose','Love & Marriage','Holidays & Traditions','Simple Pleasures'];
 const diffs = ['Simple','Standard'];
 const convos = ['on','off'];
 function opts(id, values, current, isArray, handler){
  const el = document.getElementById(id);
  if(!el) return;
  el.innerHTML = values.map(v=>{
   const active = isArray ? current.includes(v) : current===v || current===String(v);
   return `<button class="opt-btn${active?' active':''}" onclick="${handler}('${v}',this)">${v}</button>`;
  }).join('');
 }
 opts('decadeOpts', decades, settings.decade, false, 'setDecade');
 const sesEl = document.getElementById('sessionOpts');
 if(sesEl) sesEl.innerHTML = sessions.map(v=>`<button class="opt-btn${settings.sessionLen===v?' active':''}" onclick="setSession('${v}')">${v} rounds</button>`).join('');
 const raEl = document.getElementById('readAloudOpts');
 const raLabels = {off:'Off',on:'On',auto:'Auto-read'};
 if(raEl) raEl.innerHTML = readModes.map(v=>`<button class="opt-btn${settings.readAloud===v?' active':''}" onclick="setReadAloud('${v}')">${raLabels[v]}</button>`).join('');
 opts('songCatOpts', cats, settings.songCats, true, 'toggleSongCat');
 opts('chapterOpts', chaps, settings.chapters, true, 'toggleChapter');
 opts('diffOpts', diffs, settings.difficulty, false, 'setDiff');
 opts('convoOpts', convos, settings.convoStarters?'on':'off', false, 'setConvo');
 const sizeLabels = [{v:'normal',l:'Normal'},{v:'large',l:'Large'},{v:'xlarge',l:'Extra Large'}];
 const tsEl = document.getElementById('textSizeOpts');
 if(tsEl) tsEl.innerHTML = sizeLabels.map(s=>`<button class="opt-btn${settings.textSize===s.v?' active':''}" onclick="setTextSize('${s.v}',this)">${s.l}</button>`).join('');
 const hcEl = document.getElementById('highContrastOpts');
 if(hcEl) hcEl.innerHTML = [{v:false,l:'Off'},{v:true,l:'On'}].map(o=>`<button class="opt-btn${!!settings.highContrast===o.v?' active':''}" onclick="setHighContrast(${o.v})">${o.l}</button>`).join('');
}
function setHighContrast(v){ settings.highContrast=v; saveSettings(); buildSettingsUI(); }
function setDecade(v){ settings.decade=v; saveSettings(); buildSettingsUI(); }
function setSession(v){ settings.sessionLen=parseInt(v); saveSettings(); buildSettingsUI(); }
function setReadAloud(v){ settings.readAloud=v; saveSettings(); buildSettingsUI(); }
function toggleSongCat(v){
 const i=settings.songCats.indexOf(v);
 if(i>=0) settings.songCats.splice(i,1); else settings.songCats.push(v);
 if(!settings.songCats.length) settings.songCats=[v];
 saveSettings(); buildSettingsUI();
}
function toggleChapter(v){
 const i=settings.chapters.indexOf(v);
 if(i>=0) settings.chapters.splice(i,1); else settings.chapters.push(v);
 if(!settings.chapters.length) settings.chapters=[v];
 saveSettings(); buildSettingsUI();
}
function setDiff(v){ settings.difficulty=v; saveSettings(); buildSettingsUI(); }
function setConvo(v){ settings.convoStarters=(v==='on'); saveSettings(); buildSettingsUI(); }
function setTextSize(v){ settings.textSize=v; saveSettings(); buildSettingsUI(); }

  const fresh=fetch(e.request).then(r=>{if(r&&r.status===200)c.put(e.request,r.clone());return r;}).catch(()=>cached);
  return cached||fresh;
 })));
});`;
  const swBlob = new Blob([sw],{type:'application/javascript'});

{chapter:"Simple Pleasures",text:"What was your favourite time of day?",tip:"Morning coffee, afternoon light, evening walks — invite them to describe it."},
{chapter:"Simple Pleasures",text:"Tell me about a book or story you always loved.",tip:"Ask what it was about and why it stayed with them."},
{chapter:"Simple Pleasures",text:"What did a perfect Sunday afternoon look like for you?",tip:"Rest, a walk, a nap, a game — celebrate whatever they describe."},
{chapter:"Simple Pleasures",text:"Tell me about a smell that takes you right back to happiness.",tip:"Bread baking, fresh-cut grass, a certain perfume — savour it with them."},
{chapter:"Simple Pleasures",text:"What was your favourite thing to watch on television?",tip:"Name a few classics to help: I Love Lucy, Lawrence Welk, Ed Sullivan."},
{chapter:"Simple Pleasures",text:"Tell me about a song that always lifts your spirits.",tip:"If they hum it, hum along. If they can't name it, describe the feeling instead."},
{chapter:"Childhood",text:"What did the walk to school look like?",tip:"Ask about the sights, the friends, the weather — the small everyday details."},
{chapter:"Childhood",text:"What was your favourite thing to eat for lunch as a child?",tip:"A lunchbox, a school canteen, or eating at home — all are wonderful."},
{chapter:"Childhood",text:"Tell me about a pet you had when you were young.",tip:"Ask its name, what it looked like, and a favourite memory together."},
{chapter:"Childhood",text:"What did bedtime feel like in your childhood home?",tip:"A story, a prayer, a parent's voice — the small rituals that brought comfort."},
{chapter:"Childhood",text:"What is something you looked forward to every single week?",tip:"A show on the radio, a visit to a relative, a favourite meal."},
{chapter:"Family",text:"Tell me about a photograph of your family you treasure.",tip:"Describe the people in it, where it was taken, who is smiling."},
{chapter:"Family",text:"What did your mother's cooking smell like?",tip:"A single dish, a holiday meal, or just everyday cooking — all count."},
{chapter:"Family",text:"Tell me about a time a family member really surprised you.",tip:"A gift, a visit, a kind word — any surprise is worth celebrating."},
{chapter:"Family",text:"Who in your family was the best storyteller?",tip:"Ask them to share one of the stories that person always told."},
{chapter:"Work & Purpose",text:"What is the best piece of advice you ever gave someone?",tip:"Give them time — this is a lovely chance to share their wisdom."},
{chapter:"Work & Purpose",text:"Tell me about someone whose life you made better.",tip:"A child, a student, a colleague, a neighbour — any act of care counts."},
{chapter:"Love & Marriage",text:"What song always makes you think of someone you love?",tip:"If possible, play or hum a few bars together."},
{chapter:"Holidays & Traditions",text:"Tell me about New Year's Eve when you were young.",tip:"Ask about the countdown, the noise, who you were with."},
{chapter:"Holidays & Traditions",text:"Did your family have a special Sunday dinner tradition?",tip:"The tablecloth, the dishes, who sat where — the details make it real."},
{chapter:"Simple Pleasures",text:"Tell me about your favourite walk or drive.",tip:"Ask about the scenery, the season, who came along."},
{chapter:"Childhood",text:"What was your bedroom like when you were a child?",tip:"Ask about the view from the window, what you kept on your nightstand, how it felt at night."},
{chapter:"Childhood",text:"What did your mother look like when you were small?",tip:"Ask about her hair, her hands, her voice — the details that stay with us longest."},
{chapter:"Childhood",text:"What sounds do you remember from your childhood home?",tip:"A clock ticking, the radio, a screen door — small sounds carry big memories."},
{chapter:"Childhood",text:"Did you have a hiding spot or a special place that was just yours?",tip:"A tree, a corner of the garden, a spot under the stairs — invite them to describe it."},
{chapter:"Childhood",text:"What was the view from your front door when you were growing up?",tip:"A street, a field, a neighbour's house — paint the picture together."},
{chapter:"Childhood",text:"What did your father's hands look like?",tip:"Working hands hold so many stories. Give them time with this one."},
{chapter:"Childhood",text:"What did you wear on your very best days?",tip:"A Sunday dress, a favourite shirt, shoes that were saved for special occasions."},
{chapter:"Childhood",text:"Tell me about a time you laughed so hard your sides hurt.",tip:"Laughter is healing — enjoy every moment of this memory together."},
{chapter:"Childhood",text:"What was the most exciting thing that ever happened in your neighbourhood?",tip:"A parade, a fire truck, a visitor, a storm — any excitement counts."},
{chapter:"Childhood",text:"What did you keep under your bed or in your pockets as a child?",tip:"Treasures, stones, coins, sweets — children always have something precious hidden away."},
{chapter:"Childhood",text:"Who was the kindest grown-up you knew when you were little?",tip:"A neighbour, a relative, a teacher — ask what made them so kind."},
{chapter:"Childhood",text:"What was the biggest adventure you ever had as a child?",tip:"A trip, a challenge, a first time doing something — all adventures are worth celebrating."},
{chapter:"Childhood",text:"What did you eat on your very favourite days?",tip:"A birthday treat, a holiday meal, something from a favourite shop."},
{chapter:"Childhood",text:"What was the first thing you remember saving up your money for?",tip:"Ask how long it took and how it felt when you finally had enough."},
{chapter:"Childhood",text:"Tell me about a thunderstorm you remember from when you were young.",tip:"Were you inside or outside? Were you scared or excited?"},
{chapter:"Childhood",text:"What games did you play in the street with other children?",tip:"Tag, hopscotch, stickball — the names of games open up whole worlds."},
{chapter:"Childhood",text:"What was the best Christmas present you ever received as a child?",tip:"Ask where it came from, who gave it, and how long you had wanted it."},
{chapter:"Childhood",text:"What did school lunches taste like?",tip:"The smell of a school canteen can be wonderfully vivid — enjoy the details."},
{chapter:"Childhood",text:"Who made you feel safe when you were little?",tip:"A parent, a grandparent, a neighbour — safety is a beautiful gift to remember."},
{chapter:"Childhood",text:"What was the longest trip you took as a child?",tip:"By car, train, or bus — ask what you saw and how it felt to arrive."},
{chapter:"Childhood",text:"What did the last day of school before summer feel like?",tip:"The excitement, the freedom, the plans — savour it with them."},
{chapter:"Childhood",text:"Tell me about a birthday party you remember from when you were young.",tip:"Whose party was it? What games did you play? Was there cake?"},
{chapter:"Childhood",text:"What was your favourite thing about wintertime as a child?",tip:"Snow, hot cocoa, staying in — or perhaps a favourite holiday tradition."},
{chapter:"Childhood",text:"Did you have a bicycle when you were young? Where did you ride it?",tip:"Ask about the routes, the friends who came along, the places you explored."},
{chapter:"Childhood",text:"What did your grandparents' house smell like?",tip:"Old houses have the most wonderful smells — take your time with this one."},
{chapter:"Childhood",text:"What was the bravest thing you did as a child?",tip:"Climbing a tree, speaking up, trying something new — all bravery counts."},
{chapter:"Childhood",text:"What did you collect when you were young?",tip:"Stamps, coins, baseball cards, pretty stones — collections tell you so much about a person."},
{chapter:"Childhood",text:"What did springtime smell like when you were a child?",tip:"Fresh earth, blossom, rain on warm pavement — take your time."},
{chapter:"Childhood",text:"Who did you most want to be like when you grew up?",tip:"A parent, a film star, a neighbour — ask why that person inspired you."},
{chapter:"Childhood",text:"What was the most beautiful place you visited as a child?",tip:"Near or far — beauty lives in the details. Ask what made it special."},
{chapter:"Childhood",text:"What radio programme did you love as a child?",tip:"Ask what time it came on and whether the whole family listened together."},
{chapter:"Childhood",text:"What did your street look like at Christmas?",tip:"Decorations, lights, neighbours waving — the small details make it real."},
{chapter:"Childhood",text:"What chores did you have to do as a child?",tip:"Ask which ones you liked and which you tried to avoid."},
{chapter:"Childhood",text:"Tell me about a time a grown-up really surprised you.",tip:"A gift, a trip, a kind word out of nowhere — surprises stay with us."},
{chapter:"Childhood",text:"What was the coziest corner of your childhood home?",tip:"By the fire, in a window seat, under a particular quilt — find the warm spot."},
{chapter:"Childhood",text:"What did you do when it rained all day?",tip:"Board games, baking, books — a rainy day indoors has its own special magic."},
{chapter:"Childhood",text:"Did you ever have a garden? What grew there?",tip:"Vegetables, flowers, fruit trees — ask who tended it and who ate what grew."},
{chapter:"Childhood",text:"What was the most memorable meal your mother ever made?",tip:"Not the everyday meals — the special one. Ask what the occasion was."},
{chapter:"Childhood",text:"What did you look forward to every single morning when you were little?",tip:"A routine, a person, a food — small daily joys reveal so much."},
{chapter:"Childhood",text:"Tell me about a fair or carnival you went to as a child.",tip:"The sounds, the smells, the games, the food — it was all magic."},
{chapter:"Childhood",text:"What was your favourite toy that you played with for years?",tip:"Ask where it is now and what happened to it."},
{chapter:"Childhood",text:"Did you ever get lost as a child? What happened?",tip:"Keep it light — most childhood getting-lost stories end safely and become funny over time."},
{chapter:"Childhood",text:"What was the longest summer day you can remember?",tip:"Those endless summer days of childhood deserve to be talked about slowly."},
{chapter:"Childhood",text:"Who in your neighbourhood was everyone's favourite person and why?",tip:"The kind shop owner, the funny uncle next door — every street had one."},
{chapter:"Childhood",text:"What was the first film you ever saw at the cinema?",tip:"Ask where the cinema was, who took you, and how it felt walking in."},
{chapter:"Childhood",text:"What did your family do on New Year's Day?",tip:"A special meal, a walk, a tradition — the first day of the year often had its own rhythm."},
{chapter:"Childhood",text:"What did you wish for when you blew out your birthday candles?",tip:"Ask if the wish ever came true."},
{chapter:"Childhood",text:"Tell me about the best snowfall you remember from childhood.",tip:"Building snowmen, sledding, snowball fights — let the memory unfold."},
{chapter:"Childhood",text:"What was the most adventurous thing you ate as a child?",tip:"Something exotic, something daring, something you were not sure about at first."},
{chapter:"Childhood",text:"Did you have a favourite aunt or uncle? What were they like?",tip:"Ask what made them special and what you did together."},
{chapter:"Childhood",text:"What did the walk home from school feel like in autumn?",tip:"Leaves, cool air, kicking through piles — the senses hold these memories well."},
{chapter:"Childhood",text:"Tell me about the nicest thing you ever did for someone when you were a child.",tip:"Generosity learned young stays with a person forever."},
{chapter:"Childhood",text:"What did your family do on Saturday mornings?",tip:"Shopping, chores, outings — the weekly rhythm of a family is so comforting to remember."},
{chapter:"Childhood",text:"What was the funniest thing your father ever said?",tip:"Give them plenty of time — a really good memory will come."},
{chapter:"Childhood",text:"What was the sweetest thing your mother ever did for you?",tip:"The little acts of love are often the ones that stay longest."},
{chapter:"Childhood",text:"Tell me about the first time you saw the ocean.",tip:"Ask how old you were, who was with you, and how big it felt."},
{chapter:"Childhood",text:"What did the night sky look like from where you grew up?",tip:"Stars, the Milky Way, the moon — quieter times meant darker skies and more wonder."},
{chapter:"Childhood",text:"What was the most special day of the whole year when you were little?",tip:"Christmas, a birthday, a fair day — the one day that felt truly magical."},
{chapter:"Childhood",text:"What lullaby or bedtime song do you remember from childhood?",tip:"Hum it together if they remember the tune. Music is a wonderful door."},
{chapter:"Family",text:"What was your mother's favourite saying?",tip:"Those little phrases parents repeat become part of us forever."},
{chapter:"Family",text:"What did your father do to make you feel better when you were sad?",tip:"A hug, a joke, a treat — fathers have their own quiet ways of caring."},
{chapter:"Family",text:"Tell me about a time your whole family sat down to a meal together.",tip:"Ask who sat where, who said grace, who talked the most."},
{chapter:"Family",text:"What did your family home sound like on a weekday morning?",tip:"Voices, the radio, the kettle, footsteps — morning sounds are deeply anchoring."},
{chapter:"Family",text:"Who was the peacemaker in your family?",tip:"The person who smoothed things over and kept the love going."},
{chapter:"Family",text:"Tell me about a family road trip or long journey.",tip:"Ask about the car, the snacks, the songs you sang, the complaints."},
{chapter:"Family",text:"What did your siblings argue about when you were growing up?",tip:"Keep it warm and funny — family squabbles are part of every story."},
{chapter:"Family",text:"What is your favourite memory of your children as babies?",tip:"A first smile, a first word, a funny thing they did — any moment is precious."},
{chapter:"Family",text:"What did family Sunday dinner smell like when you were young?",tip:"Roast chicken, apple pie, fresh bread — let the smells bring the memory alive."},
{chapter:"Family",text:"Tell me about a time your family all laughed at the same thing.",tip:"Shared laughter is one of the greatest gifts — take your time with this one."},
{chapter:"Family",text:"What would your mother say about you if someone asked her?",tip:"Ask what she was most proud of."},
{chapter:"Family",text:"What is something your father taught you that you never forgot?",tip:"A skill, a value, a piece of advice — fathers pass things on in quiet ways."},
{chapter:"Family",text:"Tell me about a relative who lived far away but always felt close.",tip:"Letters, visits, phone calls — distance does not always mean far apart."},
{chapter:"Family",text:"What tradition did your family have that nobody else seemed to have?",tip:"A funny ritual, a special food, an unusual way of doing something — families are wonderfully unique."},
{chapter:"Family",text:"Tell me about a photograph of your family that you treasure.",tip:"Ask who is in it, when it was taken, and where it is now."},
{chapter:"Family",text:"What did your children love most about coming home?",tip:"A smell, a hug, a meal, a ritual — the things that made home feel like home."},
{chapter:"Family",text:"Who in your family had the best sense of humour?",tip:"Ask them to share a favourite joke or funny story that person used to tell."},
{chapter:"Family",text:"Tell me about a time your family pulled together during a hard time.",tip:"Families show their love most clearly when things get difficult."},
{chapter:"Family",text:"What did your mother wear that you can still picture clearly?",tip:"A favourite dress, an apron, a particular colour — clothing holds memory."},
{chapter:"Family",text:"Tell me about a holiday your family took together.",tip:"Where did you go, how did you get there, what was the best part?"},
{chapter:"Family",text:"What was the best advice your parents ever gave you?",tip:"Give them time — this is a chance to share something truly meaningful."},
{chapter:"Family",text:"Tell me about the day one of your children was born.",tip:"The wait, the moment, the feelings — one of life's most powerful memories."},
{chapter:"Family",text:"What did your grandparents do that made you feel truly loved?",tip:"Small gestures, big gestures — grandparent love is its own special thing."},
{chapter:"Family",text:"Who in your family were you most like?",tip:"Ask in what ways — looks, personality, habits, humour."},
{chapter:"Family",text:"What was something your family did together every single week?",tip:"A meal, a walk, a programme on the radio — routines are the heartbeat of a family."},
{chapter:"Family",text:"Tell me about the proudest moment you had as a parent.",tip:"Big moments or small ones — all are worth celebrating."},
{chapter:"Family",text:"What did your children ask you over and over again?",tip:"Those repeated questions that made you laugh or wear you down — they are golden now."},
{chapter:"Family",text:"Who did you miss most when you were away from home?",tip:"A person, a pet, a place — missing someone is a form of love."},
{chapter:"Family",text:"What would your family say is your greatest quality?",tip:"Warmth, humour, wisdom, patience — celebrate whatever they share."},
{chapter:"Family",text:"Tell me about a moment when your family made you feel truly special.",tip:"A surprise, a gesture, a kind word — the moments that stayed with you."},
{chapter:"Work & Purpose",text:"Tell me about the most interesting person you ever worked with.",tip:"Ask what made them stand out and what you learned from them."},
{chapter:"Work & Purpose",text:"What did you do on your very first day of work?",tip:"Nerves, excitement, a kind colleague who helped — the first day stays with us."},
{chapter:"Work & Purpose",text:"What was the hardest part of the work you did?",tip:"Physical, emotional, or mental — all kinds of hard work deserve respect."},
{chapter:"Work & Purpose",text:"Tell me about a moment at work when everything went exactly right.",tip:"A job well done, a satisfied customer, a project completed — celebrate it together."},
{chapter:"Work & Purpose",text:"What did you wear to work? Did you have a uniform?",tip:"Work clothes carry identity — ask how it felt to put them on each morning."},
{chapter:"Work & Purpose",text:"Who taught you the most about doing your job well?",tip:"A mentor, a colleague, a boss — the person who helped you find your feet."},
{chapter:"Work & Purpose",text:"Tell me about a time your work made someone else's life better.",tip:"A customer helped, a student taught, a patient cared for — all service is meaningful."},
{chapter:"Work & Purpose",text:"What did lunchtime at work look like?",tip:"Where you ate, who you sat with, what you talked about — the middle of the day has its own story."},
{chapter:"Work & Purpose",text:"What is a skill you learned at work that surprised you?",tip:"Something you never expected to be good at but turned out to be."},
{chapter:"Work & Purpose",text:"Tell me about the best team you ever worked with.",tip:"When everyone pulls together there is a special kind of joy — ask what made that team work."},
{chapter:"Work & Purpose",text:"What did you look forward to most about going to work?",tip:"A person, a task, a routine — even small things make a working life good."},
{chapter:"Work & Purpose",text:"Tell me about a time you had to solve a really difficult problem at work.",tip:"What was the problem, how did you work it out, how did it feel when you did?"},
{chapter:"Work & Purpose",text:"What is the most useful thing you ever made or built?",tip:"Something with your hands, your mind, or both — usefulness is its own kind of beauty."},
{chapter:"Work & Purpose",text:"Tell me about the commute or journey to work.",tip:"A walk, a bus ride, a drive — the journey to work is part of the story of a life."},
{chapter:"Work & Purpose",text:"What was the moment you felt most confident in your abilities?",tip:"The day you knew you had truly mastered something — it is worth savouring."},
{chapter:"Work & Purpose",text:"Tell me about a time you had to be really patient at work.",tip:"Patience is a great virtue — ask what helped you stay calm."},
{chapter:"Work & Purpose",text:"What did the place where you worked look like?",tip:"A shop, an office, a field, a kitchen — describe the walls, the windows, the feel of it."},
{chapter:"Work & Purpose",text:"Tell me about a customer or person you served who you never forgot.",tip:"Some people leave a mark — ask why this person stayed with you."},
{chapter:"Work & Purpose",text:"What would your workmates say about you?",tip:"Reliable, funny, kind, hardworking — celebrate whatever comes to mind."},
{chapter:"Work & Purpose",text:"Tell me about the last day of a job you loved.",tip:"Leaving something good is bittersweet — ask what you missed most."},
{chapter:"Work & Purpose",text:"What is something you were always better at than most people around you?",tip:"Confidence and pride in one's abilities is a joy to witness."},
{chapter:"Work & Purpose",text:"Tell me about a time someone thanked you for something you did.",tip:"Being appreciated stays with a person — let this memory shine."},
{chapter:"Work & Purpose",text:"What did retirement feel like on the very first day?",tip:"Freedom, strangeness, relief, sadness — all of it is worth talking about."},
{chapter:"Work & Purpose",text:"Tell me about a project you worked on for a long time.",tip:"The patience, the effort, the satisfaction when it was done — all of it matters."},
{chapter:"Work & Purpose",text:"What tools or equipment did you use every day at work?",tip:"Hands that knew their tools have a story — ask what the tools felt like."},
{chapter:"Work & Purpose",text:"Tell me about a young person you helped learn the ropes.",tip:"Mentoring someone is one of the most generous things a person can do."},
{chapter:"Work & Purpose",text:"What values did you try to bring to everything you did?",tip:"Honesty, care, pride, kindness — the values that shaped a working life."},
{chapter:"Work & Purpose",text:"Tell me about the best boss you ever had.",tip:"Ask what made them a good leader and how they made you feel."},
{chapter:"Work & Purpose",text:"What did you do in the evenings after a long day of work?",tip:"Rest, family, hobbies — the way we recover tells us what we value."},
{chapter:"Work & Purpose",text:"If you could go back and do one job all over again, what would it be?",tip:"There are no wrong answers — just warm memories and honest reflections."},
{chapter:"Love & Marriage",text:"What was the first thing you noticed about your husband or wife?",tip:"Their eyes, their laugh, the way they walked — first impressions are wonderful."},
{chapter:"Love & Marriage",text:"Tell me about your very first date.",tip:"Where you went, what you wore, how nervous you were — every detail is charming."},
{chapter:"Love & Marriage",text:"What made you know this was the person you wanted to spend your life with?",tip:"Give them all the time they need — this is one of life's greatest questions."},
{chapter:"Love & Marriage",text:"What did your partner do that always made you smile?",tip:"A habit, a gesture, a saying — the little things are the biggest things."},
{chapter:"Love & Marriage",text:"Tell me about the moment you got engaged.",tip:"Where were you, what was said, how did it feel?"},
{chapter:"Love & Marriage",text:"What did your partner look like on your wedding day?",tip:"Ask them to describe every detail they can remember."},
{chapter:"Love & Marriage",text:"Tell me about your honeymoon or your first home together.",tip:"The beginning of a shared life is always worth revisiting."},
{chapter:"Love & Marriage",text:"What song will always remind you of falling in love?",tip:"If possible, hum or play a few bars together."},
{chapter:"Love & Marriage",text:"Tell me about your favourite photograph of you and your partner.",tip:"Ask where it was taken, what you were doing, and why it is your favourite."},
{chapter:"Love & Marriage",text:"What did your partner cook that you loved most?",tip:"A dish, a dessert, a simple meal — food made with love is unforgettable."},
{chapter:"Love & Marriage",text:"Tell me about the most romantic thing your partner ever did.",tip:"Grand gestures or tiny ones — romance comes in all sizes."},
{chapter:"Love & Marriage",text:"What did you and your partner disagree about most?",tip:"Keep it warm and funny — every couple has their comic arguments."},
{chapter:"Love & Marriage",text:"Tell me about a trip you and your partner took together.",tip:"Where you went, what you saw, what you laughed about along the way."},
{chapter:"Love & Marriage",text:"What is the best gift your partner ever gave you?",tip:"Something bought, something made, or something said — all gifts count."},
{chapter:"Love & Marriage",text:"Tell me about the last time you and your partner danced together.",tip:"Where were you, what was playing, how did it feel?"},
{chapter:"Love & Marriage",text:"What did your partner always say when you needed cheering up?",tip:"The words that only they knew to say — those are the most precious."},
{chapter:"Love & Marriage",text:"Tell me about a time you were truly proud of your partner.",tip:"An achievement, a kindness, a brave moment — let the pride show."},
{chapter:"Love & Marriage",text:"What did an ordinary Tuesday evening look like for the two of you?",tip:"The everyday moments are the ones that quietly hold a life together."},
{chapter:"Love & Marriage",text:"Tell me about the place that was most special to you both.",tip:"A restaurant, a park, a seat by the window — every couple has their places."},
{chapter:"Love & Marriage",text:"What did love teach you that nothing else could?",tip:"Patience, joy, sacrifice, grace — there is deep wisdom here worth sharing."},
{chapter:"Holidays & Traditions",text:"Tell me about decorating for Christmas when your children were small.",tip:"Ask who hung the ornaments, who put the star on top, who got most excited."},
{chapter:"Holidays & Traditions",text:"What did Christmas Eve feel like in your home?",tip:"The anticipation, the preparations, the sounds and smells of the evening."},
{chapter:"Holidays & Traditions",text:"Tell me about a Thanksgiving where everything went perfectly.",tip:"The food, the people, the gratitude — savour every detail."},
{chapter:"Holidays & Traditions",text:"What did Easter Sunday morning feel like?",tip:"Church clothes, egg hunts, a special breakfast — the whole morning was a gift."},
{chapter:"Holidays & Traditions",text:"Tell me about a Fourth of July you will never forget.",tip:"Fireworks, parades, picnics, family — the best ones stay vivid forever."},
{chapter:"Holidays & Traditions",text:"What was the most important tradition in your family?",tip:"Something passed down, something invented — all traditions are meaningful."},
{chapter:"Holidays & Traditions",text:"Tell me about New Year's Eve when you were young.",tip:"The countdown, the noise, the kiss at midnight — the start of something new."},
{chapter:"Holidays & Traditions",text:"What did the house smell like on Christmas morning?",tip:"Pine, cinnamon, coffee, a roasting turkey — smell is the strongest memory."},
{chapter:"Holidays & Traditions",text:"Tell me about a family reunion you attended.",tip:"The relatives, the food, the stories told, the games played — reunions are their own kind of holiday."},
{chapter:"Holidays & Traditions",text:"What was your favourite thing to bake at Christmas?",tip:"Ask for the recipe if they remember it — or just the smell and the taste."},
{chapter:"Holidays & Traditions",text:"Tell me about a Halloween when the children were small.",tip:"Costumes, trick-or-treating, jack-o-lanterns — it was magic for a child."},
{chapter:"Holidays & Traditions",text:"What did your family do on Memorial Day or Veterans Day?",tip:"Parades, flags, quiet remembrance — ask what those days meant to your family."},
{chapter:"Holidays & Traditions",text:"Tell me about a birthday celebration that was truly special.",tip:"Whose birthday was it, who planned it, what made it unforgettable?"},
{chapter:"Holidays & Traditions",text:"What did your family do on the last day of summer?",tip:"A last swim, a special meal, a bittersweet feeling — the end of summer has its own mood."},
{chapter:"Holidays & Traditions",text:"Tell me about a church service that meant a great deal to you.",tip:"Easter, Christmas, a christening — some services stay with us always."},
{chapter:"Holidays & Traditions",text:"What tradition did you carry from your parents into your own family?",tip:"A recipe, a ritual, a saying — the things we pass on are the most meaningful."},
{chapter:"Holidays & Traditions",text:"Tell me about a holiday meal you cooked yourself.",tip:"The planning, the cooking, the moment everyone sat down — it was all an act of love."},
{chapter:"Holidays & Traditions",text:"What did your family do together on Christmas afternoon?",tip:"A walk, a game, a nap, a visit — the afternoon had its own gentle pace."},
{chapter:"Holidays & Traditions",text:"Tell me about a New Year's resolution that you actually kept.",tip:"Even one is worth celebrating — ask how it changed things."},
{chapter:"Holidays & Traditions",text:"What was the most memorable gift you ever gave someone?",tip:"The thought behind it, the look on their face — giving is its own reward."},
{chapter:"Holidays & Traditions",text:"Tell me about a holiday that did not go as planned but became a favourite story.",tip:"The turkey that burned, the car that broke down — sometimes the disasters make the best memories."},
{chapter:"Holidays & Traditions",text:"What did your family sing together during the holidays?",tip:"Carols, folk songs, hymns — a family that sings together holds something precious."},
{chapter:"Holidays & Traditions",text:"Tell me about a summer fair or festival you looked forward to every year.",tip:"The same stalls, the same rides, the same smells — that annual joy is worth revisiting."},
{chapter:"Holidays & Traditions",text:"What holiday tradition do you hope was passed on to your grandchildren?",tip:"The things we hope outlive us are the things that matter most."},
{chapter:"Simple Pleasures",text:"Tell me about your favourite cup of tea or coffee.",tip:"The mug, the time of day, the view from the window — a perfect cup is a whole experience."},
{chapter:"Simple Pleasures",text:"What did you love most about a Sunday morning?",tip:"Slowness, quiet, a good breakfast, the newspaper — Sundays had their own gentle magic."},
{chapter:"Simple Pleasures",text:"Tell me about a garden you loved to sit in.",tip:"Your own, a neighbour's, a park — a beautiful garden feeds the soul."},
{chapter:"Simple Pleasures",text:"What was your favourite thing to listen to on the radio?",tip:"Music, a drama, the news — the radio was a window to the world."},
{chapter:"Simple Pleasures",text:"Tell me about the best nap you ever had.",tip:"After a long day, in a hammock, in a sunny chair — a good rest is a simple joy."},
{chapter:"Simple Pleasures",text:"What was your favourite view from a window you loved?",tip:"A garden, a street, a hillside — the view we saw every day becomes part of us."},
{chapter:"Simple Pleasures",text:"Tell me about a meal that was simple but absolutely perfect.",tip:"Bread and butter, soup on a cold day, a sandwich by the water — simplicity at its best."},
{chapter:"Simple Pleasures",text:"What hobby brought you the most peace?",tip:"Knitting, gardening, fishing, reading — the things we do quietly for ourselves are gifts."},
{chapter:"Simple Pleasures",text:"Tell me about a walk you loved to take in every season.",tip:"Ask how it changed — the light, the sounds, the smells through spring, summer, autumn, winter."},
{chapter:"Simple Pleasures",text:"What was the most beautiful sunset you ever watched?",tip:"Where were you, who was with you, how long did you stay?"},
{chapter:"Simple Pleasures",text:"Tell me about a piece of music that always made you feel better.",tip:"Play or hum it if you can — music shared is music doubled."},
{chapter:"Simple Pleasures",text:"What did you love about a quiet evening at home?",tip:"A fire, a book, the television, a familiar chair — the comfort of the known."},
{chapter:"Simple Pleasures",text:"Tell me about a flower or plant that always made you happy.",tip:"Its colour, its smell, where you first saw it — beauty in small things is worth celebrating."},
{chapter:"Simple Pleasures",text:"What simple thing did you do every day that you truly looked forward to?",tip:"Morning coffee, an evening walk, reading before bed — the small rituals hold us together."},
{chapter:"Simple Pleasures",text:"Tell me about a hat or piece of clothing you loved wearing.",tip:"A favourite cardigan, a summer dress, a hat that felt just right — clothes carry identity."},
{chapter:"Simple Pleasures",text:"What was your favourite thing to do on a lazy afternoon?",tip:"Dozing, reading, pottering in the garden — a truly lazy afternoon is a gift."},
{chapter:"Simple Pleasures",text:"Tell me about a shop you loved to visit.",tip:"A bakery, a hardware store, a bookshop — some shops felt like coming home."},
{chapter:"Simple Pleasures",text:"What was your favourite thing to watch the weather do?",tip:"Snow falling, a summer storm, fog lifting — the weather has its own quiet drama."},
{chapter:"Simple Pleasures",text:"Tell me about a meal you made that everyone asked for again and again.",tip:"The recipe, the occasion, the faces at the table — a beloved dish is a legacy."},
{chapter:"Simple Pleasures",text:"What was your favourite seat in the house?",tip:"The armchair by the window, the porch rocker — we all have our spot."},
{chapter:"Simple Pleasures",text:"Tell me about a day when you had absolutely nothing to do.",tip:"How did it feel, what did you end up doing — freedom has its own flavour."},
{chapter:"Simple Pleasures",text:"What was the best thing about living where you lived?",tip:"The neighbours, the scenery, the community — place shapes a life profoundly."},
{chapter:"Simple Pleasures",text:"Tell me about something small that always cheered you up.",tip:"A song, a smell, a phone call, a treat — small things carry great power."},
{chapter:"Childhood",text:"What did the ice cream van or sweet shop mean to you as a child?",tip:"The sound of it coming down the street, the choosing, the first taste — pure joy."},
{chapter:"Childhood",text:"Tell me about a time you stayed up much later than you should have.",tip:"A special occasion, a storm, sheer stubbornness — children find ways."},
{chapter:"Childhood",text:"What was the most exciting news you ever heard as a child?",tip:"A new baby, a trip, the end of something hard — excitement felt so big then."},
{chapter:"Childhood",text:"Tell me about the kindest thing a child ever did for you.",tip:"Children have a pure generosity — ask who it was and what they did."},
{chapter:"Childhood",text:"What smells remind you most of your primary school?",tip:"Chalk, rubber, school dinners, fresh air — schools have a smell all their own."},
{chapter:"Childhood",text:"What was the most beautiful thing you ever found outdoors as a child?",tip:"A feather, a stone, a spider's web with dew — children notice things adults walk past."},
{chapter:"Childhood",text:"Tell me about a time you felt very grown-up when you were still young.",tip:"A responsibility, a privilege, a moment of trust — those moments matter enormously."},
{chapter:"Childhood",text:"What was your favourite thing about going to the library?",tip:"The quiet, the smell of books, the choosing — a library is a kind of magic."},
{chapter:"Childhood",text:"Tell me about a song your family sang on long journeys.",tip:"Singing in the car was its own kind of happiness — ask what songs they were."},
{chapter:"Childhood",text:"What did you dream about at night when you were a child?",tip:"Wonderful dreams, funny dreams — our night-time imaginings say so much."},
{chapter:"Family",text:"What is a family story that gets told at every gathering?",tip:"Every family has one — the one that never gets old no matter how many times it's told."},
{chapter:"Family",text:"Tell me about a letter or card you received from a loved one.",tip:"The handwriting, the words, where you kept it — some letters stay with us forever."},
{chapter:"Family",text:"What was the smell of your family home on a cold morning?",tip:"Toast, a wood fire, coffee, someone's perfume — cold mornings have their own particular warmth."},
{chapter:"Family",text:"Tell me about a time a family member came home after being away a long time.",tip:"The waiting, the moment of arrival, the feeling — homecomings are among life's greatest joys."},
{chapter:"Family",text:"What is something your child or grandchild said that you will never forget?",tip:"Children say the truest things — ask what made those words so unforgettable."},
{chapter:"Family",text:"Tell me about a family member who had a wonderful laugh.",tip:"Ask them to describe the laugh — sometimes just remembering it is enough to start laughing too."},
{chapter:"Family",text:"What did your family do to celebrate good news?",tip:"A special meal, a phone call to everyone, a toast — ask how the news was shared."},
{chapter:"Family",text:"Tell me about a time you felt your family was truly all together.",tip:"A rare and precious feeling — ask what the occasion was and who was there."},
{chapter:"Family",text:"What is the most important lesson your family taught you?",tip:"A value, a habit, a way of seeing the world — family is our first school."},
{chapter:"Family",text:"Tell me about something a grandchild did that made you beam with pride.",tip:"A first step, a kind act, a achievement — grandparent pride is its own kind of joy."},
{chapter:"Love & Marriage",text:"Tell me about a quiet moment with your partner that you treasure.",tip:"Not a big occasion — just an ordinary moment that somehow became golden."},
{chapter:"Love & Marriage",text:"What did your partner smell like?",tip:"A cologne, a soap, fresh air — the scent of someone we love stays with us always."},
{chapter:"Love & Marriage",text:"Tell me about a time your partner took care of you when you were unwell.",tip:"Being looked after by someone who loves you is one of life's great comforts."},
{chapter:"Love & Marriage",text:"What was the funniest moment you and your partner shared?",tip:"The joke that only the two of you understood — those are the best kind."},
{chapter:"Love & Marriage",text:"Tell me about the home you loved most that you shared together.",tip:"The garden, the kitchen, the view — ask what made it feel most like yours."},
{chapter:"Love & Marriage",text:"What did your partner do first thing every morning?",tip:"Morning routines are wonderfully intimate — the small things we do without thinking."},
{chapter:"Love & Marriage",text:"Tell me about a time you and your partner were truly in sync.",tip:"Finishing each other's sentences, knowing without words — ask when they felt it most."},
{chapter:"Love & Marriage",text:"What pet names did you have for each other?",tip:"Darling, sweetheart, something entirely their own — those names are tender treasures."},
{chapter:"Love & Marriage",text:"Tell me about a letter or note your partner wrote you.",tip:"Even a short note can hold a world of feeling — ask what it said and where it is now."},
{chapter:"Love & Marriage",text:"What did your partner do when they were proud of you?",tip:"A look, a word, a gesture — the way someone we love shows pride is unforgettable."},
{chapter:"Love & Marriage",text:"Tell me about a time you and your partner chose to do something brave together.",tip:"A move, a decision, a leap of faith — two people brave together are unstoppable."},
{chapter:"Love & Marriage",text:"What did your partner always order at a restaurant?",tip:"The reliable choice, the adventurous one — food habits reveal character."},
{chapter:"Love & Marriage",text:"Tell me about the view from the home where you were happiest together.",tip:"A garden, a street, mountains, the sea — the view from home is the view of a life."},
{chapter:"Love & Marriage",text:"What television programme did you always watch together?",tip:"The one you never missed, always watched side by side."},
{chapter:"Love & Marriage",text:"Tell me about the best holiday you ever took as a couple.",tip:"Where you went, what surprised you, what you would go back to in a heartbeat."},
{chapter:"Holidays & Traditions",text:"Tell me about the best New Year's Eve you ever celebrated.",tip:"The company, the countdown, the feeling that everything was possible."},
{chapter:"Holidays & Traditions",text:"What did your mother always cook for the holidays that nobody else could replicate?",tip:"A dish so tied to her that tasting it means being back in her kitchen."},
{chapter:"Holidays & Traditions",text:"Tell me about a Christmas carol service you attended.",tip:"The candles, the singing, the cold air outside — those evenings are very special."},
{chapter:"Holidays & Traditions",text:"What was the most meaningful gift you ever received at Christmas?",tip:"Not necessarily the most expensive — the one that showed someone truly knew you."},
{chapter:"Holidays & Traditions",text:"Tell me about an Easter Sunday that felt truly joyful.",tip:"The service, the meal, the family, the spring light — joy has many forms."},
{chapter:"Holidays & Traditions",text:"What did your neighbourhood look like decorated for the holidays?",tip:"Lights, wreaths, neighbours waving — a street at Christmas is its own kind of warmth."},
{chapter:"Holidays & Traditions",text:"Tell me about a holiday tradition that was entirely your own family's invention.",tip:"The quirky, beloved thing nobody else did — every family has one."},
{chapter:"Holidays & Traditions",text:"What holiday song always brings tears to your eyes?",tip:"Silent Night, Amazing Grace, Auld Lang Syne — some songs reach somewhere very deep."},
{chapter:"Holidays & Traditions",text:"Tell me about a Thanksgiving where the whole family came from far away.",tip:"The travel, the reunion, the table full of faces — those gatherings are precious."},
{chapter:"Holidays & Traditions",text:"What was the very last thing you did on Christmas Eve before going to sleep?",tip:"A prayer, a look at the tree, hanging a stocking — the bedtime ritual before Christmas magic."},
{chapter:"Holidays & Traditions",text:"Tell me about a holiday memory involving snow.",tip:"A white Christmas, a snowball fight, sledding — snow transforms everything."},
{chapter:"Holidays & Traditions",text:"What did you always eat on New Year's Day?",tip:"A traditional meal, a family favourite, something for luck — the first meal of the year mattered."},
{chapter:"Holidays & Traditions",text:"Tell me about a time the whole family stayed overnight for a holiday.",tip:"The sleeping arrangements, the laughter, the breakfast together — togetherness in a house."},
{chapter:"Holidays & Traditions",text:"What holiday tradition are you most glad you passed on?",tip:"The things we give our children and grandchildren are the things that truly last."},
{chapter:"Holidays & Traditions",text:"Tell me about a summer holiday tradition your family observed every year.",tip:"The same beach, the same ice cream shop, the same walk — annual rituals build a life."},
{chapter:"Simple Pleasures",text:"Tell me about a book you read more than once because you loved it so much.",tip:"Ask what drew you back to it and what it gave you each time."},
{chapter:"Simple Pleasures",text:"What was the most beautiful drive you ever took?",tip:"The road, the season, who was beside you — a good drive is its own kind of freedom."},
{chapter:"Simple Pleasures",text:"Tell me about a place where you loved to sit and think.",tip:"A bench, a porch, a hillside — where we go to be quiet says a lot about us."},
{chapter:"Simple Pleasures",text:"What was your favourite thing about springtime?",tip:"The first warm day, the blossoms, the birdsong — spring announces itself in the gentlest ways."},
{chapter:"Simple Pleasures",text:"Tell me about a meal you had outdoors that you still remember.",tip:"A picnic, a barbecue, a meal on a porch — food tastes different in the open air."},
{chapter:"Simple Pleasures",text:"What was the most satisfying thing you ever fixed or mended?",tip:"A chair, a fence, a garment — the satisfaction of putting something right is deep."},
{chapter:"Simple Pleasures",text:"Tell me about a friendship that brought you great joy.",tip:"Ask what you did together, what you talked about, why that person meant so much."},
{chapter:"Simple Pleasures",text:"What was your favourite time of year for a long walk?",tip:"The crunch of autumn leaves, spring mud, summer warmth — each season has its gift."},
{chapter:"Simple Pleasures",text:"Tell me about a concert or live performance you attended.",tip:"The music, the crowd, the feeling — live music is something you carry with you."},
{chapter:"Simple Pleasures",text:"What was your favourite thing to do on a summer evening?",tip:"Sitting outside, watching the light fade, the air cooling — summer evenings have a magic all their own."},
{chapter:"Simple Pleasures",text:"Tell me about a neighbour who became a true friend.",tip:"The person next door or down the road who became part of your life — those friendships are rare gifts."},
{chapter:"Simple Pleasures",text:"What was the most peaceful place you have ever been?",tip:"By the water, in the mountains, in a quiet garden — peace is different for everyone."},
{chapter:"Simple Pleasures",text:"Tell me about the last time you watched a beautiful sunrise.",tip:"Where you were, who was with you, how long you stayed — a sunrise demands to be witnessed."},
{chapter:"Simple Pleasures",text:"What simple act of kindness do you remember receiving from a stranger?",tip:"A held door, a helping hand, a kind word — strangers can leave a lasting impression."},
{chapter:"Simple Pleasures",text:"Tell me about a fruit or vegetable you grew yourself.",tip:"The planting, the waiting, the first harvest — growing food connects us to something ancient."},
{chapter:"Childhood",text:"What did you do on the very last day of school each year?",tip:"The excitement, the freedom, the plans — that last day had its own special electricity."},
{chapter:"Childhood",text:"Tell me about a time you explored somewhere new with friends.",tip:"An empty lot, a patch of woods, a building being built — children are the greatest explorers."},
{chapter:"Childhood",text:"What was the most delicious thing you ate at a fair or festival as a child?",tip:"Candy floss, toffee apples, hot dogs — fairground food is its own category of delicious."},
{chapter:"Childhood",text:"Tell me about a bonfire or campfire you remember from when you were young.",tip:"The flames, the smell, the people gathered around — fire brings people together."},
{chapter:"Childhood",text:"What is a sound from childhood you would love to hear again?",tip:"A voice, a bell, a particular piece of music — close your eyes and listen together."},
{chapter:"Childhood",text:"Tell me about a time you stayed at someone else's home overnight.",tip:"A grandparent's house, a friend's — sleeping somewhere new as a child is an adventure."},
{chapter:"Childhood",text:"What did you do if you woke up early on a special day?",tip:"Lying awake with excitement, sneaking downstairs — anticipation is its own pleasure."},
{chapter:"Childhood",text:"Tell me about the best tree you ever climbed.",tip:"Ask how high you got, whether you were supposed to be up there, how the world looked from above."},
{chapter:"Childhood",text:"What was the longest you ever had to wait for something exciting?",tip:"Patience as a child is a great achievement — ask if the wait was worth it."},
{chapter:"Childhood",text:"Tell me about a time your parents surprised you with something wonderful.",tip:"The look on your face, the feeling in your chest — surprises from parents are pure gold."},
{chapter:"Family",text:"Tell me about a relative who had wonderful hands — a baker, a carpenter, a knitter.",tip:"Our hands tell the story of our lives — ask to describe what those hands could do."},
{chapter:"Family",text:"What is something your family always disagreed about, but always laughed about too?",tip:"Politics, sport, the right way to cook something — loving disagreements are part of every family."},
{chapter:"Work & Purpose",text:"What did you do to prepare yourself at the start of a big working day?",tip:"A routine, a ritual, a quiet moment — the way we get ready tells us what we care about."},
{chapter:"Work & Purpose",text:"Tell me about a time your hard work was truly noticed and appreciated.",tip:"A word from a boss, a thank-you from a customer — being seen matters enormously."},
{chapter:"Work & Purpose",text:"What is something you built, grew, or created that still exists somewhere?",tip:"A house, a garden, a piece of work, a business — the things we leave behind are part of us."},
{chapter:"Work & Purpose",text:"Tell me about the most important decision you made in your working life.",tip:"To stay, to leave, to try something new — work decisions shape a whole life."},
{chapter:"Work & Purpose",text:"Who was the most unforgettable colleague you ever had?",tip:"Funny, brilliant, kind, or simply impossible — ask what made them so memorable."},
{chapter:"Work & Purpose",text:"Tell me about a time you had to learn something completely new for work.",tip:"The challenge, the effort, the moment it clicked — learning at any age is remarkable."},
{chapter:"Work & Purpose",text:"What would you say to a young person just starting out in your field?",tip:"Hard-won wisdom deserves to be shared — give them all the time they need."},
{chapter:"Work & Purpose",text:"Tell me about the longest journey you ever made for work.",tip:"Where you went, what you did, what surprised you most."},
{chapter:"Work & Purpose",text:"What did you do with your very first pay packet?",tip:"Saving, spending, giving — what we do first with money says a great deal."},
{chapter:"Work & Purpose",text:"Tell me about a time you had to keep going when things were very difficult.",tip:"Resilience is one of the greatest human qualities — honour it together."},
{chapter:"Work & Purpose",text:"What did your workplace smell like?",tip:"Fresh bread, engine oil, hay, clean linen — the smell of honest work is its own reward."},
{chapter:"Work & Purpose",text:"Tell me about a celebration at work you still remember.",tip:"A retirement party, a milestone, a job well done — workplace celebrations have their own warmth."},
{chapter:"Work & Purpose",text:"What did you do to wind down after a hard week?",tip:"Friday evening rituals restore us — ask what theirs looked like."},
{chapter:"Work & Purpose",text:"Tell me about someone whose career you watched and admired.",tip:"A colleague who rose, a friend who built something — ask what you respected most."},
{chapter:"Work & Purpose",text:"What is a habit from your working years that you kept long into retirement?",tip:"Early rising, a morning routine, a way of organising things — work shapes us for life."},
{chapter:"Love & Marriage",text:"Tell me about the first time you introduced your partner to your family.",tip:"The nerves, the moment, the relief — ask how it went and what everyone thought."},
{chapter:"Love & Marriage",text:"What did your partner say to you on your wedding day that you will never forget?",tip:"Give them all the time they need — some words are held very close."},
{chapter:"Love & Marriage",text:"Tell me about the most beautiful thing your partner ever did for someone else.",tip:"A kindness to a stranger, a sacrifice for family — the goodness in a person we love."},
{chapter:"Love & Marriage",text:"What did you and your partner argue about when you were first married?",tip:"Keep it warm and light — early marriage arguments are often wonderfully funny in hindsight."},
{chapter:"Love & Marriage",text:"Tell me about a time your partner made you feel like the luckiest person alive.",tip:"A gesture, a look, a moment — love announces itself in surprising ways."},
{chapter:"Love & Marriage",text:"What was your partner's greatest talent?",tip:"Something they could do that always made you stop and admire them."},
{chapter:"Love & Marriage",text:"Tell me about the way your partner laughed.",tip:"A laugh is as unique as a fingerprint — ask them to describe it, or better yet, to show it."},
{chapter:"Love & Marriage",text:"What did your partner read, watch, or listen to that you loved them for?",tip:"Taste in stories reveals a person's heart — ask what it said about them."},
{chapter:"Love & Marriage",text:"Tell me about a time you surprised your partner.",tip:"A gift, a plan, a gesture out of nowhere — the pleasure of surprising someone you love."},
{chapter:"Love & Marriage",text:"What is something you learned from your partner that changed you?",tip:"A new perspective, a new skill, a new way of being — love teaches us profoundly."},
{chapter:"Love & Marriage",text:"Tell me about a favourite restaurant or café you and your partner had.",tip:"The table you always sat at, what you always ordered — shared places become sacred."},
{chapter:"Love & Marriage",text:"What song was playing when you had your first dance together?",tip:"If they hum it, hum along — that song holds a whole world."},
{chapter:"Love & Marriage",text:"Tell me about a rainy day you spent entirely together indoors.",tip:"A fire, a game, a long conversation — being cosy together is one of love's great gifts."},
