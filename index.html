{chapter:"Love & Marriage",text:"What did your partner do that showed they were proud of you?",tip:"The boast to a friend, the look across the room — being seen clearly by someone who loves us is everything."},
{chapter:"Love & Marriage",text:"Tell me about a moment your partner surprised you with their wisdom.",tip:"The insight you did not expect, the perspective that changed yours — ask what they said."},
{chapter:"Love & Marriage",text:"What is the thing you love most about the life you built together?",tip:"Take all the time that is needed — this is the heart of everything."},
{chapter:"Work & Purpose",text:"Tell me about a time you were given a chance you almost did not take.",tip:"The opportunity that nearly slipped away — ask what made you reach for it after all."},
{chapter:"Work & Purpose",text:"What is the most important relationship your working life gave you?",tip:"A mentor, a partner, a lifelong friend — some of our most significant people arrive through work."},
{chapter:"Work & Purpose",text:"Tell me about a time you worked outdoors and loved it.",tip:"The weather on your face, the physical freedom — outdoor work connects us to something deep."},
{chapter:"Work & Purpose",text:"What did your colleagues do to mark your last day of work?",tip:"The card, the cake, the speech, the handshakes — a working life deserves a proper farewell."},
{chapter:"Work & Purpose",text:"Tell me about something you made at work that you still have.",tip:"The object kept, the certificate framed — the physical proof of years well spent."},
{chapter:"Work & Purpose",text:"What is a skill from your working life that you taught someone in your family?",tip:"Work wisdom passed into the family — the knowledge that crossed from career into home."},
{chapter:"Work & Purpose",text:"Tell me about the working day you most wish you could live again.",tip:"The perfect working day — ask what made it so, from the moment you arrived to the moment you left."},
{chapter:"Work & Purpose",text:"What is the proudest thing your family ever said about your work?",tip:"The pride that came back to you through someone you loved — ask what they said and when."},
{chapter:"Work & Purpose",text:"Tell me about the kindest thing you ever received on the job.",tip:"A gift, a word, a gesture — workplace kindness stays with us longer than we expect."},
{chapter:"Work & Purpose",text:"What did your work mean to the community around you?",tip:"The shop that served the neighbourhood, the school that shaped the town — work in context."},
{chapter:"Work & Purpose",text:"Tell me about a time you helped someone at work through a very hard day.",tip:"The support that cost you time and gave them everything — kindness in a workplace matters enormously."},
{chapter:"Work & Purpose",text:"What is one more thing about your working life that deserves to be remembered?",tip:"Whatever has not yet been said — give them all the space they need to complete their story."},
{chapter:"Holidays & Traditions",text:"Tell me about the most anticipated arrival at any holiday gathering.",tip:"The relative everyone waited for, the guest who made the party — ask who it was and why."},
{chapter:"Holidays & Traditions",text:"What did you always do on the morning of Christmas Eve?",tip:"The last preparations, the particular busyness of that morning — ask what your role always was."},
{chapter:"Holidays & Traditions",text:"Tell me about a holiday where laughter completely took over.",tip:"The meal that dissolved into helpless laughter — ask what started it and how long it lasted."},
{chapter:"Holidays & Traditions",text:"What is a recipe that only ever appeared at the holidays?",tip:"The dish saved for special times — ask why it was never made at any other moment of the year."},
{chapter:"Holidays & Traditions",text:"Tell me about a winter walk that became an annual tradition.",tip:"The same route, the same cold air, the same company — annual walks become a form of prayer."},
{chapter:"Holidays & Traditions",text:"What did your children always say on Christmas morning?",tip:"The first words, the exclamations — ask if they can still hear those voices saying them."},
{chapter:"Holidays & Traditions",text:"Tell me about the most heartfelt gift you ever watched someone receive.",tip:"Not your own gift — a moment of witnessing pure, grateful joy in someone else."},
{chapter:"Holidays & Traditions",text:"What holiday smell could you identify with your eyes closed anywhere in the world?",tip:"The smell that says: this is Christmas, this is home, this is us — unmistakable and irreplaceable."},
{chapter:"Holidays & Traditions",text:"Tell me about a time the whole family agreed a holiday had been perfect.",tip:"The rare consensus — everyone saying yes, this was the one, this was the best."},
{chapter:"Holidays & Traditions",text:"What is the most important thing the holidays ever taught you?",tip:"About family, about gratitude, about what truly matters — a life of holidays offers real wisdom."},
{chapter:"Holidays & Traditions",text:"Tell me about a surprise that happened at the holidays that nobody saw coming.",tip:"The unexpected guest, the announcement, the gift — happy surprises at gatherings are pure gold."},
{chapter:"Holidays & Traditions",text:"What holiday made you feel most connected to your heritage or roots?",tip:"A cultural tradition, a family recipe, a prayer from the old country — roots nourish us."},
{chapter:"Holidays & Traditions",text:"Tell me about the last holiday where everyone you loved was present.",tip:"Hold this gently — the full table, before it changed. Ask them to describe who was there."},
{chapter:"Holidays & Traditions",text:"What did you always hope visitors would say about your holiday home?",tip:"The compliment you most wanted to hear — ask if they ever heard it."},
{chapter:"Holidays & Traditions",text:"Tell me about a holiday tradition that began as an accident.",tip:"The mistake that became beloved, the improvised solution that stuck — happy accidents in families."},
{chapter:"Holidays & Traditions",text:"What is the thing about your family's holidays that no other family had?",tip:"The particular thing that was entirely yours — ask them to describe it as if to a stranger."},
{chapter:"Holidays & Traditions",text:"Tell me about a time a holiday brought unexpected healing.",tip:"The gathering that mended something, the occasion that softened a hard heart — hold this tenderly."},
{chapter:"Holidays & Traditions",text:"What is the most beautiful thing you ever saw a child do at a holiday gathering?",tip:"The spontaneous kindness, the funny prayer, the generous moment — children at their finest."},
{chapter:"Holidays & Traditions",text:"Tell me about a holiday that marked a turning point in your family's story.",tip:"Before and after — ask what changed and what the holiday had to do with it."},
{chapter:"Holidays & Traditions",text:"What is the holiday tradition you are most grateful was passed on to you?",tip:"From a parent, a grandparent, a community — the gift of a tradition received with gratitude."},
{chapter:"Holidays & Traditions",text:"Tell me about the very best holiday meal you ever sat down to.",tip:"The food, the company, the table — ask them to describe it as though reliving every moment."},
{chapter:"Holidays & Traditions",text:"What holiday memory do you want to carry with you always?",tip:"The one to hold onto — ask them to describe it in as much detail as they can give."},
{chapter:"Love & Marriage",text:"Tell me about the moment you first truly understood what your partner meant to you.",tip:"Not the falling in love — the deeper understanding that came later, quietly, and stayed."},
{chapter:"Love & Marriage",text:"What is the most beautiful thing about having loved someone for a long time?",tip:"The depth, the knowing, the ease — long love is a different country from new love."},
{chapter:"Love & Marriage",text:"Tell me about a time your partner made an ordinary moment extraordinary.",tip:"Nothing special planned — just the way they were that day, turning the ordinary into a gift."},
{chapter:"Love & Marriage",text:"What did love teach you that you could not have learned any other way?",tip:"Patience, selflessness, joy, grief — love is the great teacher. Give them all the time they need."},
{chapter:"Love & Marriage",text:"Tell me about the last time you felt completely, simply happy with your partner.",tip:"The recent ordinary moment — hold it together with warmth and complete presence."},
{chapter:"Love & Marriage",text:"What do you most want to say about your love story?",tip:"Whatever has not yet been said — the final, most important word about a life shared together."},
{chapter:"Work & Purpose",text:"Tell me about a time your instincts at work proved completely right.",tip:"The hunch that paid off, the decision that looked risky and turned out to be wise."},
{chapter:"Work & Purpose",text:"What did doing good work feel like in your body at the end of a day?",tip:"The satisfying tiredness, the particular kind of peace — honest labour has a physical reward."},
{chapter:"Work & Purpose",text:"Tell me about the working year you look back on most fondly.",tip:"A particular year when everything came together — ask what made it so good."},
{chapter:"Work & Purpose",text:"What is something from your working life that still makes you proud today?",tip:"The achievement, the relationship, the thing built — pride that has not diminished with time."},
{chapter:"Work & Purpose",text:"Tell me about the last piece of work you were truly satisfied with.",tip:"The thing you finished and thought: yes, that is right, that is good — honour that moment."},
{chapter:"Work & Purpose",text:"What do you most want people to know about the work you did?",tip:"The final word on a working life — give them all the space and time they deserve."},
{chapter:"Work & Purpose",text:"Tell me about a time the whole workplace came together for something good.",tip:"A charity effort, a celebration, a crisis met together — workplaces at their best are communities."},
{chapter:"Work & Purpose",text:"What is a talent you had at work that you never fully got to use?",tip:"The gift not yet fully given — ask what it was and what they might have done with more room."},
{chapter:"Work & Purpose",text:"Tell me about the colleague who made the hardest days bearable.",tip:"The person whose presence changed the atmosphere — ask what it was about them."},
{chapter:"Work & Purpose",text:"What did your working life give your family that they may not have realised?",tip:"Security, opportunity, example, pride — work's gifts to a family go far beyond wages."},
{chapter:"Work & Purpose",text:"Tell me about a moment when you knew exactly why you did the work you did.",tip:"Clarity of purpose, sudden and complete — ask when it came and what it felt like."},
{chapter:"Work & Purpose",text:"What is the most human moment you ever experienced at work?",tip:"The laugh, the tear, the unexpected connection — work is lived by people, and people bring everything."},
{chapter:"Work & Purpose",text:"Tell me about the work that felt most like a calling.",tip:"Not a job but a vocation — the work that felt like it was meant to be yours."},
{chapter:"Holidays & Traditions",text:"Tell me about the most meaningful toast ever raised at your table.",tip:"The words that silenced the room in the best way — ask if any of it can still be remembered."},
{chapter:"Holidays & Traditions",text:"What is a holiday memory involving candlelight that you will never forget?",tip:"A church service, a dinner table, a power cut turned magical — candlelight changes everything."},
{chapter:"Holidays & Traditions",text:"Tell me about the holiday where a child in your family said grace for the first time.",tip:"The small voice, the serious face, the words — a child's first grace is unforgettable."},
{chapter:"Holidays & Traditions",text:"What did your family always do the moment guests arrived at a holiday gathering?",tip:"The first embrace, the kettle on, the coats taken — a family's welcome says everything."},
{chapter:"Holidays & Traditions",text:"Tell me about a holiday tradition that surprised you with how much it meant.",tip:"Something done out of habit that suddenly, one year, hit differently — ask when and why."},
{chapter:"Holidays & Traditions",text:"What is the last holiday tradition you want to share?",tip:"Whatever comes to mind — the final, warmest memory of the year's celebrations."}
);
